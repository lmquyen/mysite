<html>
<head>
	<style>
        body { font-family: sans-serif; max-width: 400px; margin: 50px auto; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 8px; }
        button { background: #2ea44f; color: white; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Send mail</h2>
    <form id="contact-form">
		<label>
			Email To:
			<input type="email" id="to_email" placeholder="Email To" required>
		</label>
		<label>
			Email CC:
			<input type="email" id="email_cc" placeholder="Email To">
		</label>
		<label>
			Subject:
			<input type="text" id="subject" required>
		</label>
		<label>
			Message:
			<textarea id="message" placeholder="Message"></textarea>
		</label>
        
        
		<!--input type="text" id="name" placeholder="name" required><br><br>
		<input type="text" id="email" placeholder="email" required-->
        <button type="submit">Submit</button>
    </form>
</body>
</html>
