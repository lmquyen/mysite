<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" src="https://cdn.jsdelivr.net"></script>
    <script type="text/javascript">
        (function() {
            // Thay 'YOUR_PUBLIC_KEY' bằng Public Key trong trang Account của EmailJS
            emailjs.init("tZO450pZWxz-SOY-S");
        })();
    </script>
</head>
<body>
    <h2>Gửi Mail Đến Bất Kỳ Ai</h2>
    <form id="contact-form">
        <input type="email" id="to_email" placeholder="Email người nhận (To)" required><br><br>
        <input type="text" id="subject" placeholder="Tiêu đề (Subject)" required><br><br>
        <textarea id="message" placeholder="Nội dung tin nhắn"></textarea><br><br>
		<input type="text" id="name" placeholder="name" required><br><br>
		<input type="text" id="email" placeholder="email" required><br><br>
        <button type="submit">Gửi Ngay</button>
    </form>

    <script>
        document.getElementById('contact-form').addEventListener('submit', function(event) {
            event.preventDefault();
            
            // Các tham số tương ứng với {{variable}} trong Template EmailJS
            const params = {
                to_email: document.getElementById('to_email').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value,
				name: document.getElementById('name').value,
				email: document.getElementById('email').value
            };

            // Thay 'YOUR_SERVICE_ID' và 'YOUR_TEMPLATE_ID'
            emailjs.send('service_cl5jf6e', 'template_1p2524w', params)
                .then(function() {
                    alert('Gửi thành công!');
                }, function(error) {
                    alert('Lỗi: ' + JSON.stringify(error));
                });
        });
    </script>
</body>
</html>
